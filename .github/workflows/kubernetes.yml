name: Despliegue EKS - Estrategias de Rollout

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      strategy:
        description: 'Estrategia a Ejecutar (Debe ser: rolling-update, recreate, blue-green, o canary)'
        required: true
        type: string
        default: 'rolling-update' # Opciones [rolling-update, recreate, canary, blue-green]
      eks_cluster_name:
        description: 'Nombre del Cluster EKS (duoc-eks-cluster-cli)'
        required: true
        default: 'duoc-eks-cluster-cli'
      aws_region:
        description: 'Región de AWS'
        required: true
        default: 'us-east-1'

jobs:
  deploy-strategy:
    runs-on: ubuntu-latest
    permissions:
      contents: read 
    
    steps:
      - name: Checkout Código
        uses: actions/checkout@v4

      - name: Configurar Credenciales AWS (AK/SK/Token)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}

  # ✅ ESTA ES LA FORMA CORRECTA Y OFICIAL
      - name: Configurar Kubectl para EKS
        run: |
          aws eks update-kubeconfig --name duoc-eks-cluster-cli --region us-east-1
      
# -----------------------------------------------------------
      # 2.1. 🔄 ROLLING UPDATE (Comportamiento por defecto de K8s)
      # -----------------------------------------------------------
      - name: 🔄 Ejecutar Rolling Update (Default)
        if: ${{ github.event.inputs.strategy == 'rolling-update' }}
        run: |
          echo "Aplicando YAML para Rolling Update (Actualización gradual)..."
          # Corrección: Ruta explícita al archivo YAML en su repositorio
          kubectl apply -f k8s/rolling-deployment.yml 
          kubectl rollout status deployment/duoc-app-rolling --timeout=300s
          echo "✅ Rolling Update completado."

      # -----------------------------------------------------------
      # 2.2. ❌ RECREATE (All-in-once)
      # -----------------------------------------------------------
      - name: ❌ Ejecutar Recreate (All-in-once)
        if: ${{ github.event.inputs.strategy == 'recreate' }}
        run: |
          echo "Aplicando YAML para Recreate (All-in-once)..."
          # Corrección: Se utiliza la variable del repositorio en lugar del marcador de posición literal
          kubectl apply -f ${{ vars.YAML_FILE_RECREATE }}
          kubectl rollout status deployment/duoc-app-recreate --timeout=300s
          echo "✅ Recreate completado."
          
      # -----------------------------------------------------------
      # 2.3. 🟦 BLUE/GREEN (Switch atómico con Patch)
      # -----------------------------------------------------------
      - name: 🟦 Ejecutar Blue/Green (kubectl patch)
        if: ${{ github.event.inputs.strategy == 'blue-green' }}
        run: |
          DEPLOYMENT_GREEN_NAME="duoc-app-green"
          SERVICE_NAME="duoc-app-bg-service"
          
          echo "1. Desplegando el entorno GREEN (Inactivo)..."
          kubectl apply -f ${{ vars.YAML_FILE_GREEN }}
          
          # Uso de $ para variable local de Bash
          kubectl rollout status deployment/$DEPLOYMENT_GREEN_NAME --timeout=300s
          echo "✅ Rollout de GREEN completado."
          
          echo "2. Ventana de Prueba/Observación (120 segundos)..."
          sleep 120
          echo "✅ Prueba simulada completada."
          
          echo "3. Ejecutando el Switch de tráfico: BLUE -> GREEN..."
          # Uso de $ para variable local de Bash
          kubectl patch service $SERVICE_NAME -p '{"spec": {"selector": {"version": "green"}}}'
          echo "✅ Switch de tráfico completado."
          
      # -----------------------------------------------------------
      # 2.4. 🐥 CANARY (Promoción con Scale)
      # -----------------------------------------------------------
      - name: 🐥 Ejecutar Canary (kubectl scale)
        if: ${{ github.event.inputs.strategy == 'canary' }}
        run: |
          DEPLOYMENT_CANARY_NAME="duoc-app-canary-v2"
          STABLE_DEPLOYMENT_NAME="duoc-app-stable-v1"
          TOTAL_REPLICAS=3 
          
          echo "1. Desplegando el entorno CANARY (10% de tráfico)..."
          kubectl apply -f ${{ vars.YAML_FILE_CANARY }}
          
          # Uso de $ para variables locales de Bash
          kubectl rollout status deployment/$DEPLOYMENT_CANARY_NAME --timeout=300s
          echo "✅ Rollout de CANARY inicial completado."
          
          echo "2. Ventana de Prueba/Observación (120 segundos)..."
          sleep 120
          echo "✅ Prueba simulada completada."
          
          echo "3. PROMOCIÓN: Escalar V2 a $TOTAL_REPLICAS y V1 a 0..."
          # Uso de $ para variables locales de Bash
          kubectl scale deployment/$DEPLOYMENT_CANARY_NAME --replicas=$TOTAL_REPLICAS
          kubectl scale deployment/$STABLE_DEPLOYMENT_NAME --replicas=0
          
          echo "4. Esperando el Rollout de Promoción (V2)..."
          kubectl rollout status deployment/$DEPLOYMENT_CANARY_NAME --timeout=300s
          echo "✅ Promoción Canary completada."
